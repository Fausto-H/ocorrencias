services:
  db:
    image: postgres:16-alpine
    container_name: ocorrencias-db
    environment:
      POSTGRES_DB: ocorrencias
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocorrencias"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ocorrencias-backend
    working_dir: /var/www
    env_file:
      - ./backend/.env.docker
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ocorrencias
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      WHATSAPP_QUEUE: whatsapp
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    command: sh -lc "composer install --no-interaction --prefer-dist && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000 --no-reload"

  queue-worker:
    build:
      context: ./backend
    container_name: ocorrencias-queue-worker
    working_dir: /var/www
    env_file:
      - ./backend/.env.docker
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ocorrencias
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      WHATSAPP_QUEUE: whatsapp
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/var/www
    command: sh -lc "composer install --no-interaction --prefer-dist && php artisan queue:work --queue=whatsapp,default --tries=3"

  frontend:
    build:
      context: ./frontend
    container_name: ocorrencias-frontend
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  frontend_node_modules:
